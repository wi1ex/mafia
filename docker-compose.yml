x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

networks:
  edge:
    driver: bridge
  database:
    driver: bridge
    internal: true
  cache:
    driver: bridge
    internal: true
  media:
    driver: bridge
    internal: true

volumes:
  pg_data:
  redis_data:
  minio_data:

services:
  db:
    image: postgres:17-alpine
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: ["pg_data:/var/lib/postgresql/data"]
#    ports:
#      - "5432:5432"
#    networks: [edge, internal]
    networks: [database]
    logging: *default-logging
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --loglevel
      - "warning"
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
    volumes: ["redis_data:/data"]
#    ports:
#      - "6379:6379"
#    networks: [edge, internal]
    networks: [cache]
    logging: *default-logging
    restart: always

  minio:
    image: minio/minio:RELEASE.2025-07-18T21-56-31Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data
    volumes: ["minio_data:/data"]
    networks: [media]
    logging: *default-logging
    restart: always

  backend:
    build: ./backend
    container_name: backend
    env_file: .env
    environment:
      GUNICORN_CMD_ARGS: >-
        --bind 0.0.0.0:8000
        --workers ${WORKERS:-1}
        --threads ${THREADS:-1}
        --keep-alive 75
        --timeout 60
        --graceful-timeout 20
        --backlog 2048
        --forwarded-allow-ips=*
        --log-level info
        --access-logfile -
        --access-logformat '%({x-request-id}i)s %(h)s %(t)s "%(m)s %(U)s %(H)s" %(s)s %(b)s %(L)s'
        --error-logfile -
    depends_on:
      - db
      - redis
      - minio
    networks: [edge, database, cache, media]
    logging: *default-logging
    restart: always

  bot:
    build: ./bot
    container_name: bot
    environment:
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      BACKEND_URL: http://backend:8000/api
      BOT_API_TOKEN: ${BOT_API_TOKEN}
      WEBHOOK_HOST: https://${DOMAIN}
      WEBHOOK_PATH: ${BOT_WEBHOOK_PATH}
      WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET}
      WEBHOOK_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - backend
      - redis
    expose:
      - "8081"
    networks: [edge, cache]
    logging: *default-logging
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_TG_BOT_NAME: "${TG_BOT_NAME}"
        VITE_BUILD_ID: "${BUILD_ID}"
    container_name: nginx
    environment:
      DOMAIN: ${DOMAIN}
      SSL_CERT_PATH: ${SSL_CERT_PATH}
      SSL_KEY_PATH: ${SSL_KEY_PATH}
      LIVEKIT_UPSTREAM: ${LIVEKIT_UPSTREAM}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    depends_on:
      - backend
    networks: [edge, media]
    logging: *default-logging
    restart: always
